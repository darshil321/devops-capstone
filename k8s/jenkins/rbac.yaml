# =============================================================================
# JENKINS RBAC
# =============================================================================
# Jenkins needs to restart the app deployment after pushing a new image.
# This ClusterRole + binding grants the minimum permissions required:
#   - get/list/watch deployments (to check status)
#   - patch/update deployments (to trigger rollout restart)
#
# Principle of least privilege: Jenkins can only touch the capstone namespace.
# It cannot create/delete namespaces, access secrets, or touch kube-system.
# =============================================================================
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: jenkins-deployer
  namespace: capstone
rules:
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets"]
    verbs: ["get", "list", "watch", "patch", "update"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: jenkins-deployer
  namespace: capstone
subjects:
  - kind: ServiceAccount
    name: jenkins
    namespace: jenkins
roleRef:
  kind: Role
  name: jenkins-deployer
  apiGroup: rbac.authorization.k8s.io
